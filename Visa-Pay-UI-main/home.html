<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPay</title>
    <script src="app.js?v=16"></script>
    <script src="pay-sheet.js?v=16" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="theme.css?v=16">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');

        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        .num { font-family: 'Space Grotesk', sans-serif; }
        .glow-orb { position:fixed; z-index:0; width:50vw;height:50vw;border-radius:50%;filter:blur(100px);opacity:.28;
            background: radial-gradient(circle,#39c0ff,transparent 60%); top:38%; left:30%; animation: float 20s ease-in-out infinite -4s; }
        [data-theme="dark"] .glow-orb { opacity:.4; }
        @keyframes float { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(5vw,-4vw) scale(1.12)} }

        .wrap { position: relative; z-index: 2; }

        /* glass uses theme vars -> flips light/dark */
        .glass {
            background: var(--nv-glass);
            backdrop-filter: blur(26px) saturate(150%); -webkit-backdrop-filter: blur(26px) saturate(150%);
            border: 1px solid var(--nv-glass-brd);
            box-shadow: inset 0 1px 0 var(--nv-glass-hi), var(--nv-shadow);
        }
        .glass-in { background: var(--nv-glass); border:1px solid var(--nv-glass-brd); backdrop-filter: blur(14px); }
        .tap { transition: transform .16s cubic-bezier(.16,1,.3,1); } .tap:active { transform: scale(.95); }

        /* neon card — vivid in both themes (hero element) */
        .neon-card {
            position: relative; border-radius: 28px; overflow: hidden;
            background: linear-gradient(135deg,#3a6bff 0%, #7a49ff 55%, #4b2ec9 100%);
            box-shadow: 0 24px 55px -22px rgba(90,70,255,.55), inset 0 1px 0 rgba(255,255,255,.25);
        }
        .neon-card::after { content:""; position:absolute; inset:0;
            background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,.22) 47%, transparent 64%);
            transform: translateX(-40%); animation: sheen 6s ease-in-out infinite; }
        @keyframes sheen { 0%,100%{transform:translateX(-45%)} 50%{transform:translateX(45%)} }

        .chip { width:44px;height:32px;border-radius:6px;background:linear-gradient(135deg,#c8a24a,#f7e79b 50%,#c8a24a);position:relative;box-shadow:0 1px 3px rgba(0,0,0,.3); }
        .chip::before{content:"";position:absolute;inset:6px;border:1px solid rgba(0,0,0,.15);border-radius:3px}

        .act { display:flex; flex-direction:column; align-items:center; gap:9px; }
        .act .ic { width:58px;height:58px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;
            background: var(--nv-glass); border:1px solid var(--nv-glass-brd); backdrop-filter: blur(12px);
            box-shadow: inset 0 1px 0 var(--nv-glass-hi); transition: transform .16s; }
        .act:active .ic { transform: scale(.9); }
        .act .lbl { font-size:11px; font-weight:700; color:var(--nv-ink2); }
        .ink { color: var(--nv-ink); } .sub { color: var(--nv-sub); } .ink2 { color: var(--nv-ink2); }

        /* bottom nav */
        .nav { position: fixed; bottom: 18px; left:16px; right:16px; max-width: calc(100% - 32px); margin:0 auto; z-index: 60; }
        .nav-bar {
            height: 64px; border-radius: 28px; display:flex; align-items:center; justify-content:space-between; padding: 0 22px;
            background: rgba(255,255,255,.28); backdrop-filter: blur(36px) saturate(180%); -webkit-backdrop-filter: blur(36px) saturate(180%);
            border: 1px solid rgba(255,255,255,.55); box-shadow: 0 14px 40px -12px rgba(40,60,120,.28), inset 0 1px 0 rgba(255,255,255,.7);
        }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--nv-sub); font-size:19px; transition:color .2s; }
        .nav-item span { font-size:9px; font-weight:700; }
        .nav-item.on { color:var(--nv-blue); }
        .nav-fab { width:54px;height:54px;border-radius:19px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;
            background: linear-gradient(135deg,#3a6bff,#7a49ff); box-shadow: 0 10px 24px rgba(80,80,255,.45); }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div class="aurora"></div><div class="glow-orb"></div>

    <div class="wrap px-5 pb-32 pt-7">

        <!-- header -->
        <header class="flex items-center justify-between mb-7">
            <a href="profile.html" class="flex items-center gap-3 tap">
                <div class="w-11 h-11 rounded-full p-0.5" style="background:linear-gradient(135deg,#3b6bff,#7b3bff)">
                    <img id="avatar" src="IMG_20251214_013513.jpg" class="w-full h-full rounded-full object-cover border-2 border-[#05060E]">
                </div>
                <div class="leading-tight">
                    <p class="text-[11px] sub font-semibold">Welcome back</p>
                    <p id="handle" class="text-[15px] font-extrabold ink">pranav_d_18</p>
                </div>
            </a>
            <a href="notifications.html" class="relative glass tap w-11 h-11 rounded-full flex items-center justify-center text-[#c3ccec]">
                <i class="fa-solid fa-bell"></i>
                <span id="notif-dot" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 bg-[#ff375f] text-white text-[10px] font-bold rounded-full flex items-center justify-center"></span>
            </a>
        </header>

        <!-- balance -->
        <div class="mb-5">
            <p class="text-[12px] font-bold sub uppercase tracking-[0.15em] mb-1">Total Balance</p>
            <div class="flex items-end gap-3">
                <h1 id="balance" class="num text-[42px] font-bold ink leading-none tracking-tight" onclick="toggleHide()">$429,487.93</h1>
                <span class="mb-1.5 text-[12px] font-bold text-[#33d69f] flex items-center gap-1"><i class="fa-solid fa-arrow-trend-up"></i> 2.4%</span>
            </div>
        </div>

        <!-- neon card (pins while scrolling, then releases) -->
        <div class="neon-card p-5 mb-6 tap sticky top-3 z-30" onclick="location.href='cards.html'">
            <div class="flex justify-between items-start mb-8 relative z-10">
                <div class="chip"></div>
                <span id="card-brand"><img src="assets/visa.svg" class="h-6 brightness-0 invert opacity-90"></span>
            </div>
            <div class="flex items-end justify-between relative z-10">
                <div>
                    <p id="card-num" class="num text-[17px] tracking-[3px] text-white/90 mb-2">•••• •••• •••• 8144</p>
                    <p class="text-[10px] font-bold text-white/50 uppercase tracking-widest">Nova Infinite</p>
                </div>
                <i class="fa-solid fa-wifi rotate-90 text-white/40"></i>
            </div>
        </div>

        <!-- quick actions -->
        <div class="grid grid-cols-4 gap-3 mb-7">
            <a href="pay.html" class="act tap"><div class="ic" style="color:#4d8bff"><i class="fa-solid fa-paper-plane"></i></div><span class="lbl">Send</span></a>
            <a href="receive.html" class="act tap"><div class="ic" style="color:#33d69f"><i class="fa-solid fa-qrcode"></i></div><span class="lbl">Receive</span></a>
            <a href="topup.html" class="act tap"><div class="ic" style="color:#ffb020"><i class="fa-solid fa-plus"></i></div><span class="lbl">Add</span></a>
            <a href="wallet.html" class="act tap"><div class="ic" style="color:#c07bff"><i class="fa-solid fa-wallet"></i></div><span class="lbl">Wallet</span></a>
        </div>

        <!-- activity -->
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-[15px] font-extrabold ink">Recent Activity</h3>
            <a href="transactions.html" class="text-[12px] font-bold text-[#4d8bff]">History</a>
        </div>
        <div id="activity" class="glass rounded-3xl p-2"></div>
    </div>

    <!-- nav -->
    <div class="nav">
        <div class="nav-bar">
            <a href="home.html" class="nav-item on"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="cards.html" class="nav-item"><i class="fa-solid fa-credit-card"></i><span>Cards</span></a>
            <a href="pay.html" class="nav-fab tap"><i class="fa-solid fa-qrcode"></i></a>
            <a href="stats.html" class="nav-item"><i class="fa-solid fa-chart-line"></i><span>Stats</span></a>
            <a href="user.html" class="nav-item"><i class="fa-solid fa-user"></i><span>User</span></a>
        </div>
    </div>

    <script>
        const CLR = { green:'#33d69f', red:'#ff5c7a', slate:'#8a94b8', purple:'#c07bff', blue:'#4d8bff', orange:'#ffb020' };
        const BG  = { green:'rgba(51,214,159,.14)', red:'rgba(255,92,122,.14)', slate:'rgba(138,148,184,.14)', purple:'rgba(192,123,255,.14)', blue:'rgba(77,139,255,.14)', orange:'rgba(255,176,32,.14)' };

        function render() {
            const s = NovaPay.state;
            document.getElementById('handle').textContent = s.profile.handle;
            if (s.profile.avatar) document.getElementById('avatar').src = s.profile.avatar;
            const ac = NovaPay.activeCard();
            document.getElementById('card-num').textContent = '•••• •••• •••• ' + ac.last4;
            document.getElementById('card-brand').innerHTML = ac.network === 'amex'
                ? '<span style="background:#fff;color:#08528f;font-weight:800;font-size:9px;padding:4px 6px;border-radius:4px">AMEX</span>'
                : '<img src="assets/visa.svg" class="h-6 brightness-0 invert opacity-90">';

            document.getElementById('balance').textContent = s.settings.hideBalance ? '••••••' : NovaPay.fmt(NovaPay.balanceCents);

            const unread = NovaPay.unreadCount(), dot = document.getElementById('notif-dot');
            if (unread > 0) { dot.classList.remove('hidden'); dot.textContent = unread > 9 ? '9+' : unread; } else dot.classList.add('hidden');

            // activity
            const list = NovaPay.transactions().slice(0,5);
            document.getElementById('activity').innerHTML = list.length ? list.map((t,i)=>`
                <div class="flex items-center gap-3 p-3 ${i<list.length-1?'border-b border-white/5':''}">
                    <div class="tx-ic" style="width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:${BG[t.color]||BG.slate};color:${CLR[t.color]||CLR.slate}"><i class="fa-solid ${t.icon}"></i></div>
                    <div class="flex-1 min-w-0"><p class="text-[14px] font-bold ink truncate">${t.name}</p><p class="text-[11px] sub truncate">${t.note}</p></div>
                    <p class="num text-[14px] font-bold whitespace-nowrap" style="color:${t.amountCents>=0?CLR.green:'#e8edff'}">${NovaPay.fmt(t.amountCents,{signed:true})}</p>
                </div>`).join('') : '<p class="text-center sub text-sm py-6">No activity yet</p>';
        }

        function toggleHide(){ NovaPay.setSetting('hideBalance', !NovaPay.state.settings.hideBalance); render(); }

        window.addEventListener('novapay:change', () => { NovaPay.reload(); render(); });
        function boot(){ try{ render(); }catch(e){} document.body.classList.add('loaded'); }
        if (document.readyState !== 'loading') boot(); else document.addEventListener('DOMContentLoaded', boot);
        setTimeout(boot, 300);
    </script>
    <script src="haptics.js?v=16" defer></script>
</body>
</html>
