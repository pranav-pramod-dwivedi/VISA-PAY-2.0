<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPay | Trusted Devices</title>
    <script src="app.js?v=16"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="theme.css?v=16">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family:'Plus Jakarta Sans',sans-serif; color:#0F172A; margin:0; overflow-x:hidden; -webkit-tap-highlight-color:transparent; }

        .prof-bg { position:fixed; inset:0; z-index:-1; overflow:hidden;
            background:linear-gradient(170deg,#e6ecff 0%,#eae6fb 50%,#e6f3ff 100%); }
        .prof-bg::before{ content:""; position:absolute; width:80vw; height:80vw; top:-25vw; left:-20vw; border-radius:50%;
            background:radial-gradient(circle,#9fbaff,transparent 62%); opacity:.55; filter:blur(50px); }
        .prof-bg::after{ content:""; position:absolute; width:70vw; height:70vw; bottom:-22vw; right:-20vw; border-radius:50%;
            background:radial-gradient(circle,#c9b0ff,transparent 62%); opacity:.5; filter:blur(50px); }

        .info-group{
            background:rgba(255,255,255,.45); backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
            border:1px solid rgba(255,255,255,.75);
            box-shadow:0 12px 34px -14px rgba(60,80,150,.35), inset 0 1px 0 rgba(255,255,255,.85);
            border-radius:22px; overflow:hidden; }
        .cap-btn{ background:rgba(255,255,255,.72); border:1px solid rgba(255,255,255,.9); box-shadow:0 6px 16px -8px rgba(60,80,150,.3); }
        .row-ic{ width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;
            box-shadow:inset 0 1px 0 rgba(255,255,255,.6); }
        /* FA glyphs carry their own baseline metrics — centring the inline box
           leaves the glyph sitting high. Make the <i> its own centred flex box. */
        .row-ic > i, .row-ic > svg { display:flex; align-items:center; justify-content:center;
            width:1em; height:1em; line-height:1; }
        .ic-blue{ background:rgba(58,107,255,.13); color:#3a6bff; }
        .ic-green{ background:rgba(18,184,134,.13); color:#12b886; }
        .ic-grey{ background:rgba(120,140,190,.1); color:#64748b; }
        .spring{ transition:transform .35s cubic-bezier(.34,1.56,.64,1); } .spring:active{ transform:scale(.96); }

        .dev-row { transition:opacity .35s, transform .35s, max-height .35s; max-height:90px; overflow:hidden; }
        .dev-row.removing { opacity:0; transform:translateX(-30px); max-height:0; }
        .this-dev { font-size:8px; font-weight:800; background:rgba(18,184,134,.15); color:#12b886;
            padding:2px 7px; border-radius:99px; text-transform:uppercase; letter-spacing:.06em; }
        .revoke { font-size:11px; font-weight:800; color:#f0506e; background:rgba(240,80,110,.1);
            padding:6px 12px; border-radius:99px; border:none; cursor:pointer; }
        .revoke:active { transform:scale(.94); }

        :root[data-theme="dark"] .prof-bg{ background:linear-gradient(170deg,#0a0f1e,#0d1226 60%,#0a1020); }
        :root[data-theme="dark"] .info-group{ background:rgba(40,44,54,.55); border-color:rgba(255,255,255,.07); }
        :root[data-theme="dark"] body{ color:#eaf0ff; }
        :root[data-theme="dark"] .text-slate-800{ color:#eaf0ff !important; }
        :root[data-theme="dark"] .text-slate-900{ color:#f2f5ff !important; }
    </style>
</head>
<body class="max-w-md mx-auto relative">
    <div class="prof-bg"></div>

    <div class="min-h-screen pb-20">
        <header class="px-5 py-6 flex justify-between items-center">
            <a href="profile.html" class="cap-btn spring w-10 h-10 rounded-full flex items-center justify-center text-slate-500">
                <i class="fa-solid fa-chevron-left text-[14px]"></i>
            </a>
            <h1 class="text-[14px] font-extrabold text-slate-900">Trusted Devices</h1>
            <div class="w-10"></div>
        </header>

        <section class="px-5 space-y-7">
            <div class="info-group p-5 flex items-start gap-4">
                <div class="row-ic ic-blue"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <p class="text-[13px] font-bold text-slate-800">Devices signed in to your account</p>
                    <p class="text-[11px] text-slate-400 font-semibold mt-1 leading-relaxed">
                        Revoke any device you don't recognise. It'll be signed out immediately and asked for full verification next time.
                    </p>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Active Sessions</h3>
                    <span class="text-[10px] font-extrabold text-slate-400" id="dev-count"></span>
                </div>
                <div class="info-group" id="dev-list"></div>
            </div>

            <button onclick="revokeAll()" class="info-group spring w-full p-4 flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-from-bracket text-[13px]" style="color:#f0506e"></i>
                <span class="text-[13px] font-extrabold" style="color:#f0506e">Sign out all other devices</span>
            </button>
        </section>
    </div>

    <script>
        // Seeded once into NovaPay settings so revokes persist like every other setting.
        const SEED_DEVICES = [
            { id:'d1', name:'Redmi Note 8 Pro', meta:'Myeongdong · this device',      ic:'fa-mobile-screen', current:true  },
            { id:'d2', name:'MacBook Pro 16"',  meta:'Bengaluru, IND · 2 weeks ago',  ic:'fa-laptop',        current:false },
            { id:'d3', name:'iPad Air',         meta:'BLR, IND · 3 days ago',         ic:'fa-tablet-screen-button', current:false },
            { id:'d4', name:'Apple Watch S9',   meta:'Paired · 5 days ago',           ic:'fa-clock',         current:false },
            { id:'d5', name:'Chrome · Windows', meta:'Bengaluru, IND · 1 month ago',  ic:'fa-desktop',       current:false },
        ];

        function devices() {
            const saved = NovaPay.state.settings.trustedDevices;
            return (saved === undefined) ? SEED_DEVICES : SEED_DEVICES.filter(d => saved.includes(d.id));
        }
        function persist(list) { NovaPay.setSetting('trustedDevices', list.map(d => d.id)); }

        function render() {
            const list = devices();
            document.getElementById('dev-count').textContent = list.length + ' device' + (list.length===1?'':'s');
            document.getElementById('dev-list').innerHTML = list.map((d, i) => `
                <div class="dev-row p-4 flex items-center gap-4 ${i < list.length-1 ? 'border-b border-white/40' : ''}" data-id="${d.id}">
                    <div class="row-ic ${d.current ? 'ic-green' : 'ic-grey'}"><i class="fa-solid ${d.ic}"></i></div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <p class="text-[13px] font-bold text-slate-800 truncate">${d.name}</p>
                            ${d.current ? '<span class="this-dev">This device</span>' : ''}
                        </div>
                        <p class="text-[10px] text-slate-400 font-semibold mt-0.5 truncate">${d.meta}</p>
                    </div>
                    ${d.current ? '' : `<button class="revoke" onclick="revoke('${d.id}')">Revoke</button>`}
                </div>`).join('');
        }

        function revoke(id) {
            const row = document.querySelector(`.dev-row[data-id="${id}"]`);
            if (row) row.classList.add('removing');
            if (navigator.vibrate) navigator.vibrate([10, 40, 10]);
            setTimeout(() => {
                persist(devices().filter(d => d.id !== id));
                render();
            }, 340);
        }

        function revokeAll() {
            const others = devices().filter(d => !d.current);
            if (!others.length) return;
            document.querySelectorAll('.dev-row').forEach(r => {
                if (!r.querySelector('.this-dev')) r.classList.add('removing');
            });
            if (navigator.vibrate) navigator.vibrate([15, 40, 15]);
            setTimeout(() => { persist(devices().filter(d => d.current)); render(); }, 340);
        }

        window.addEventListener('novapay:change', () => { NovaPay.reload(); });
        window.onload = render;
    </script>
    <script src="haptics.js?v=16" defer></script>
</body>
</html>
