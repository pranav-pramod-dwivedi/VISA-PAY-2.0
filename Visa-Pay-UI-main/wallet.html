<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPay | Wallet</title>
    <script src="app.js?v=16"></script>
    <script src="pay-sheet.js?v=16" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="theme.css?v=16">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
      body { font-family:'Plus Jakarta Sans',sans-serif; color:#0F172A; margin:0; overflow-x:hidden; -webkit-tap-highlight-color:transparent; background:transparent; }
      :root[data-theme="dark"] body { color:#e8eefc; }
      :root[data-theme="dark"] .text-slate-900{color:#f1f5ff!important}
      :root[data-theme="dark"] .text-slate-500,:root[data-theme="dark"] .text-slate-400{color:#8b96ad!important}
      #wrap { position:relative; z-index:2; }
      .glass{ background:var(--nv-glass); backdrop-filter:blur(26px) saturate(150%); -webkit-backdrop-filter:blur(26px) saturate(150%); border:1px solid var(--nv-glass-brd); box-shadow:inset 0 1px 0 var(--nv-glass-hi), var(--nv-shadow); }
      .glass-thick{ background:var(--nv-glass); }
      .glass-tap{ transition:transform .16s; } .glass-tap:active{ transform:scale(.96); }
      .glass-pill{ background:var(--nv-glass); border:1px solid var(--nv-glass-brd); border-radius:999px; }
      .glass-nav{ background:var(--nv-glass); backdrop-filter:blur(30px) saturate(160%); -webkit-backdrop-filter:blur(30px) saturate(160%); border:1px solid var(--nv-glass-brd); box-shadow:var(--nv-shadow), inset 0 1px 0 var(--nv-glass-hi); }
      [data-theme="dark"] .glass-nav{ background:rgba(16,20,40,.72); }
      .text-slate-900{ color:var(--nv-ink)!important; } .text-slate-500,.text-slate-400,.text-slate-300{ color:var(--nv-sub)!important; }
      .bar { height:10px; border-radius:999px; background:rgba(120,140,180,.18); overflow:hidden; }
      .bar > span { display:block; height:100%; border-radius:999px; }
      .seg-icn { width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0; }
    </style>
</head>
<body class="max-w-md mx-auto relative pb-28">
    <div class="aurora"></div>

  <div id="wrap" class="px-5 pt-8">
    <header class="flex items-center gap-3 mb-6">
      <a href="home.html" class="glass glass-tap w-10 h-10 flex items-center justify-center" style="border-radius:999px"><i class="fa-solid fa-chevron-left text-slate-900"></i></a>
      <h1 class="text-xl font-extrabold text-slate-900">Wallet</h1>
    </header>

    <!-- REWARDS -->
    <div class="glass glass-thick p-5 mb-5" style="border-radius:26px">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide">Rewards</p>
          <p class="text-3xl font-black text-slate-900 mt-1"><span id="pts">0</span> <span class="text-base font-bold text-slate-500">pts</span></p>
        </div>
        <span class="glass-pill px-3 py-1.5 text-[11px] font-extrabold" id="tier">Platinum</span>
      </div>
      <div class="flex items-center justify-between glass p-3" style="border-radius:16px">
        <div class="flex items-center gap-3">
          <div class="seg-icn" style="background:rgba(139,92,246,.14);color:#8b5cf6"><i class="fa-solid fa-gift"></i></div>
          <div>
            <p class="text-[13px] font-bold text-slate-900">Cashback available</p>
            <p class="text-[12px] text-slate-500"><span id="cashback">$0.00</span> ready to redeem</p>
          </div>
        </div>
        <button onclick="redeem()" class="bg-blue-600 text-white text-[12px] font-bold px-4 py-2 rounded-xl active:scale-95 transition">Redeem</button>
      </div>
    </div>

    <!-- SPENDING INSIGHTS -->
    <div class="glass p-5 mb-5" style="border-radius:26px">
      <div class="flex justify-between items-end mb-4">
        <div>
          <p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide">Spending · last 30 days</p>
          <p class="text-2xl font-black text-slate-900 mt-1" id="spend-total">$0.00</p>
        </div>
        <i class="fa-solid fa-chart-pie text-slate-300 text-xl"></i>
      </div>
      <div id="insights"></div>
    </div>

    <!-- SCHEDULED -->
    <div class="glass p-5" style="border-radius:26px">
      <div class="flex justify-between items-center mb-4">
        <p class="text-[11px] font-bold text-slate-500 uppercase tracking-wide">Upcoming & Recurring</p>
        <i class="fa-solid fa-calendar-days text-slate-300"></i>
      </div>
      <div id="scheduled"></div>
    </div>
  </div>

  <!-- bottom nav -->
  <div class="nv-nav"><div class="nv-nav-bar">
    <a href="home.html" class="nv-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="cards.html" class="nv-item"><i class="fa-solid fa-credit-card"></i><span>Cards</span></a>
    <a href="pay.html" class="nv-fab"><i class="fa-solid fa-qrcode"></i></a>
    <a href="stats.html" class="nv-item"><i class="fa-solid fa-chart-line"></i><span>Stats</span></a>
    <a href="user.html" class="nv-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
  </div></div>

  <script>
    const CAT_COLORS = { 'Food & Drink':'#22c55e','Groceries':'#16a34a','Transport':'#0ea5e9','Shopping':'#f59e0b','Entertainment':'#ef4444','Transfers':'#8b5cf6','Payments':'#0052FF','Rewards':'#a855f7','Other':'#64748b','Income':'#10b981' };
    function color(c){ return CAT_COLORS[c] || '#64748b'; }

    function render() {
      const r = NovaPay.rewards();
      document.getElementById('pts').textContent = r.pointsBalance.toLocaleString();
      document.getElementById('tier').textContent = r.tier;
      document.getElementById('cashback').textContent = NovaPay.fmt(r.cashbackCents);

      const ins = NovaPay.insights(30);
      document.getElementById('spend-total').textContent = NovaPay.fmt(ins.total);
      document.getElementById('insights').innerHTML = ins.rows.length ? ins.rows.map(row => `
        <div class="mb-3">
          <div class="flex justify-between text-[13px] mb-1">
            <span class="font-bold text-slate-900">${row.category}</span>
            <span class="font-bold text-slate-500">${NovaPay.fmt(row.cents)} · ${row.pct}%</span>
          </div>
          <div class="bar"><span style="width:${row.pct}%;background:${color(row.category)}"></span></div>
        </div>`).join('') : '<p class="text-sm text-slate-400 text-center py-3">No spending yet.</p>';

      const sc = NovaPay.scheduled();
      document.getElementById('scheduled').innerHTML = sc.length ? sc.map(s => {
        const days = Math.max(0, Math.ceil((s.nextTs - Date.now())/86400000));
        return `
        <div class="flex items-center gap-3 py-3" style="border-top:1px solid rgba(120,140,180,.14)">
          <div class="seg-icn" style="background:rgba(0,82,255,.1);color:#0052FF"><i class="fa-solid ${s.icon}"></i></div>
          <div class="flex-1 min-w-0">
            <p class="text-[14px] font-bold text-slate-900 truncate">${s.name}</p>
            <p class="text-[12px] text-slate-500">${NovaPay.fmt(s.amountCents)} · in ${days}d · ${s.autopay?'Autopay on':'Manual'}</p>
          </div>
          <button onclick="paySc('${s.id}')" class="text-[12px] font-bold text-blue-600 px-3 py-1.5 glass-pill">Pay</button>
        </div>`;
      }).join('') : '<p class="text-sm text-slate-400 text-center py-3">Nothing scheduled.</p>';
    }

    function redeem() {
      const r = NovaPay.redeemCashback();
      if (!r.ok) { alert(r.error); return; }
      if (window.confetti) confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors:['#8b5cf6','#22c55e'] });
      render();
    }
    function paySc(id) {
      const r = NovaPay.paySchedule(id);
      if (!r.ok) { alert(r.error); return; }
      if (window.confetti) confetti({ particleCount: 60, spread: 55, origin: { y: 0.6 } });
      render();
    }

    window.addEventListener('novapay:change', () => { NovaPay.reload(); render(); });
    window.onload = render;
  </script>
    <script src="haptics.js?v=16" defer></script>
</body>
</html>
