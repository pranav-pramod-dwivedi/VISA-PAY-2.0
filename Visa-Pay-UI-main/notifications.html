<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaPay | Notifications</title>
    <script src="app.js?v=16"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="theme.css?v=16">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --visa-blue: #0052FF;
            --surface: #FFFFFF;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent;
            color: #0F172A;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        :root[data-theme="dark"] body { color:#e8eefc; }
        :root[data-theme="dark"] .text-slate-900 { color:#f1f5ff !important; }
        :root[data-theme="dark"] .text-slate-400 { color:#8b96ad !important; }
        #main-content { position: relative; z-index: 1; }
        .noti { display:flex; gap:14px; padding:16px; margin-bottom:12px; align-items:flex-start;
            background:var(--nv-glass) !important; backdrop-filter:blur(24px) saturate(150%); -webkit-backdrop-filter:blur(24px) saturate(150%);
            border:1px solid var(--nv-glass-brd); box-shadow:inset 0 1px 0 var(--nv-glass-hi), var(--nv-shadow); border-radius:20px;
            transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
        .noti:active { transform:scale(.98); }
        .noti-ic { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.05rem; flex-shrink:0; box-shadow:inset 0 1px 0 rgba(255,255,255,.5); }
        .noti.unread { box-shadow:inset 0 1px 0 var(--nv-glass-hi), 0 0 0 1.5px rgba(58,107,255,.4), var(--nv-shadow); }
        .noti.unread::before { content:""; position:absolute; }
        .day-label { font-size:11px; font-weight:800; color:var(--nv-sub); text-transform:uppercase; letter-spacing:.1em; margin:8px 4px 10px; }

        /* --- SKELETON --- */
        .skeleton-block { background: #f1f5f9; position: relative; overflow: hidden; border-radius: 8px; }
        .skeleton-block::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); animation: shimmer 0.8s infinite linear; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #skeleton-screen { position: fixed; inset: 0; background: white; z-index: 2000; transition: opacity 0.5s ease; padding: 24px; }
        .loaded #skeleton-screen { opacity: 0; pointer-events: none; }

        /* --- FLOATING BELL ANIMATION --- */
        @keyframes bellFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(5deg); }
            75% { transform: translateY(-5px) rotate(-5deg); }
        }
        
        .animated-bell {
            animation: bellFloat 3s ease-in-out infinite;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto relative">
    <div class="aurora"></div>

    

    <!-- 1. Skeleton Screen -->
    <div id="skeleton-screen">
        <div class="w-10 h-10 rounded-full skeleton-block mb-10"></div>
        <div class="h-8 w-48 skeleton-block mb-20"></div>
        <div class="flex flex-col items-center">
            <div class="w-32 h-32 rounded-full skeleton-block mb-6"></div>
            <div class="w-56 h-6 rounded-full skeleton-block mb-2"></div>
            <div class="w-40 h-4 rounded-full skeleton-block"></div>
        </div>
    </div>

    <!-- 2. Main Content -->
    <div id="main-content" class="min-h-screen flex flex-col pb-20">
        
        <!-- Header -->
        <header class="px-5 py-6 flex justify-between items-center sticky top-0 z-50">
            <a href="home.html" class="glass glass-tap w-11 h-11 rounded-full flex items-center justify-center active:scale-90 transition-all" style="border-radius:999px">
                <i class="fa-solid fa-chevron-left text-[15px] text-slate-900"></i>
            </a>
            <h1 class="text-[13px] font-extrabold text-slate-900 tracking-[0.1em] uppercase">Inbox</h1>
            <button onclick="clearAll()" class="text-[12px] font-bold text-blue-600">Mark read</button>
        </header>

        <div class="px-5 mt-2" id="noti-list"></div>

        <!-- Empty State -->
        <div id="noti-empty" class="hidden flex-1 flex flex-col items-center justify-center px-10 text-center pb-20 mt-10">
            <div class="w-28 h-28 glass rounded-full flex items-center justify-center mb-8 animated-bell" style="border-radius:999px">
                <i class="fa-solid fa-bell-slash text-slate-300 text-4xl"></i>
            </div>
            <h2 class="text-lg font-extrabold text-slate-900 mb-2">Nothing to see here</h2>
            <p class="text-[13px] text-slate-400 font-medium leading-relaxed max-w-[250px]">
                We'll let you know when something important happens with your account or payments.
            </p>
        </div>
    </div>

    <script>
        function timeAgo(ts) {
            const s = Math.floor((Date.now() - ts) / 1000);
            if (s < 60) return 'just now';
            if (s < 3600) return Math.floor(s/60) + 'm ago';
            if (s < 86400) return Math.floor(s/3600) + 'h ago';
            const d = Math.floor(s/86400);
            if (d < 30) return d + 'd ago';
            if (d < 365) return Math.floor(d/30) + 'mo ago';
            const y = Math.floor(d/365); return y + 'y ago';
        }
        function render() {
            const list = NovaPay.notifications();
            const box = document.getElementById('noti-list');
            const empty = document.getElementById('noti-empty');
            if (!list.length) { box.innerHTML = ''; empty.classList.remove('hidden'); empty.classList.add('flex'); return; }
            empty.classList.add('hidden');
            const tint = (icon) => {
                const map = {
                    'fa-arrow-down':['rgba(18,184,134,.16)','#12b886'], 'fa-gift':['rgba(139,92,246,.16)','#8b5cf6'],
                    'fa-n':['rgba(240,80,110,.16)','#f0506e'], 'fa-mobile-screen':['rgba(58,107,255,.16)','#3a6bff'],
                    'fa-credit-card':['rgba(58,107,255,.16)','#3a6bff'], 'fa-file-invoice':['rgba(245,158,11,.16)','#f59e0b'],
                    'fa-crown':['rgba(245,158,11,.16)','#f59e0b'], 'fa-receipt':['rgba(139,92,246,.16)','#8b5cf6'],
                    'fa-plane':['rgba(58,107,255,.16)','#3a6bff'], 'fa-shield-halved':['rgba(18,184,134,.16)','#12b886'],
                    'fa-arrow-up':['rgba(18,184,134,.16)','#12b886'], 'fa-piggy-bank':['rgba(18,184,134,.16)','#12b886'],
                    'fa-cake-candles':['rgba(240,80,110,.16)','#f0506e'], 'fa-bolt':['rgba(58,107,255,.16)','#3a6bff'],
                    'fa-paper-plane':['rgba(58,107,255,.16)','#3a6bff'], 'fa-wallet':['rgba(245,158,11,.16)','#f59e0b'],
                    'fa-hand-holding-dollar':['rgba(139,92,246,.16)','#8b5cf6'],
                };
                return map[icon] || ['rgba(58,107,255,.16)','#3a6bff'];
            };
            box.innerHTML = list.map(n => {
                const [bg,fg] = tint(n.icon);
                return `
                <div class="noti ${n.read ? '' : 'unread'}" style="position:relative">
                    <div class="noti-ic" style="background:${bg};color:${fg}"><i class="fa-solid ${n.icon || 'fa-bell'}"></i></div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                          <p class="text-[14px] font-bold text-slate-900">${n.title}</p>
                          ${n.read?'':'<span style="width:7px;height:7px;border-radius:50%;background:#3a6bff;flex-shrink:0"></span>'}
                        </div>
                        <p class="text-[12px] text-slate-400 mt-0.5">${n.body}</p>
                        <p class="text-[10px] text-slate-400 mt-1 font-semibold uppercase tracking-wide">${timeAgo(n.ts)}</p>
                    </div>
                </div>`;
            }).join('');
        }
        function clearAll() { NovaPay.markNotificationsRead(); render(); }
        window.addEventListener('novapay:change', () => { NovaPay.reload(); render(); });
        window.onload = function() {
            render();
            // mark read shortly after viewing
            setTimeout(() => { document.body.classList.add('loaded'); }, 500);
        };
    </script>
    <script src="haptics.js?v=16" defer></script>
</body>
</html>
