<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System</title>
    <script src="app.js?v=16"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
      body { font-family:'Plus Jakarta Sans',sans-serif; background:#0b1020; color:#e8eefc; margin:0; -webkit-tap-highlight-color:transparent; }
      .mono { font-family:'JetBrains Mono',monospace; }
      .panel { background:#131a2e; border:1px solid #23304f; border-radius:16px; }
      input,select { background:#0b1020; border:1px solid #2a375a; color:#e8eefc; border-radius:10px; padding:8px 10px; font-size:13px; width:100%; }
      input:focus,select:focus { outline:none; border-color:#3b82f6; }
      .btn { background:#1d4ed8; color:#fff; font-weight:700; border-radius:10px; padding:10px; border:none; }
      .btn-ghost { background:#1b2440; color:#9fb0d5; }
      .btn-danger { background:#7f1d1d; color:#fecaca; }
      .row { border-bottom:1px solid #1c2540; }
      .pin-dot { width:16px; height:16px; border-radius:50%; background:#2a375a; transition:all .15s; }
      .pin-dot.on { background:#3b82f6; transform:scale(1.1); }
      .key { background:#131a2e; border:1px solid #23304f; border-radius:14px; padding:16px 0; font-size:22px; font-weight:700; color:#e8eefc; }
      .key:active { background:#1b2440; }
      /* icon picker */
      .icon-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
      .icon-opt { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
        background:#0b1020; border:1px solid #2a375a; color:#9fb0d5; font-size:14px; cursor:pointer; transition:all .15s; }
      .icon-opt.sel { background:#1d4ed8; border-color:#3b82f6; color:#fff; }
      .icon-opt > i { display:flex; align-items:center; justify-content:center; width:1em; height:1em; line-height:1; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen">

  <!-- LOCK SCREEN -->
  <div id="lock" class="min-h-screen flex flex-col items-center justify-center px-8">
    <div class="w-16 h-16 rounded-2xl bg-[#131a2e] border border-[#23304f] flex items-center justify-center text-blue-400 text-2xl mb-6">
      <i class="fa-solid fa-terminal"></i>
    </div>
    <h1 class="text-lg font-extrabold mb-1">Developer Console</h1>
    <p class="text-xs text-slate-500 mb-8">Restricted · enter access PIN</p>
    <div class="flex gap-4 mb-6" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <p id="pin-err" class="text-red-400 text-xs font-bold h-4 mb-4"></p>
    <div class="grid grid-cols-3 gap-3 w-full max-w-[260px]">
      <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
      <button class="key opacity-0 pointer-events-none">·</button><button class="key" data-k="0">0</button>
      <button class="key" data-k="del"><i class="fa-solid fa-delete-left"></i></button>
    </div>
    <a href="home.html" class="text-slate-600 text-xs mt-8">← Exit</a>
  </div>

  <!-- CONSOLE -->
  <div id="console" class="hidden px-4 py-6 pb-24">
    <div class="flex items-center justify-between mb-5">
      <div><h1 class="text-lg font-extrabold">Developer Console</h1><p class="text-[11px] text-slate-500 mono">novapay_state_v1 · localStorage</p></div>
      <a href="home.html" class="btn btn-ghost text-xs px-3 py-2" style="border-radius:10px">Exit</a>
    </div>

    <!-- balance + account -->
    <div class="panel p-4 mb-4">
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-2">Account</p>
      <label class="text-xs text-slate-400">Balance (USD)</label>
      <div class="flex gap-2 mt-1 mb-3">
        <input id="bal-in" type="number" step="0.01" class="mono">
        <button class="btn px-4" onclick="setBal()" style="border-radius:10px">Set</button>
      </div>
      <label class="text-xs text-slate-400">Display name</label>
      <div class="flex gap-2 mt-1 mb-3">
        <input id="name-in" placeholder="Pranav D.">
        <button class="btn btn-ghost px-4" onclick="setName()" style="border-radius:10px">Save</button>
      </div>
      <label class="text-xs text-slate-400">Username / handle</label>
      <div class="flex gap-2 mt-1 mb-3">
        <input id="handle-in" placeholder="pranav_d_18" class="mono">
        <button class="btn btn-ghost px-4" onclick="setHandle()" style="border-radius:10px">Save</button>
      </div>
      <label class="text-xs text-slate-400">Profile picture</label>
      <div class="flex items-center gap-3 mt-2">
        <img id="pfp-preview" src="" style="width:44px;height:44px;border-radius:50%;object-fit:cover;background:#0b1020;border:1px solid #2a375a">
        <input type="file" id="pfp-file" accept="image/*" style="flex:1;padding:6px;font-size:11px">
      </div>
    </div>

    <!-- contacts editor: name / handle / picture per person -->
    <div class="panel p-4 mb-4">
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-3">Contacts</p>
      <div id="contact-editor"></div>
    </div>

    <!-- add transaction -->
    <div class="panel p-4 mb-4">
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-2">Add / Inject Transaction</p>
      <div class="grid grid-cols-2 gap-2 mb-2">
        <input id="a-name" placeholder="Name">
        <input id="a-note" placeholder="Note">
      </div>
      <div class="grid grid-cols-2 gap-2 mb-2">
        <input id="a-amt" type="number" step="0.01" placeholder="Amount (+in / -out)" class="mono">
        <input id="a-date" type="date">
      </div>
      <label class="text-xs text-slate-400">Icon</label>
      <div class="icon-grid" id="tx-icons"></div>
      <div class="flex items-center gap-2 my-2">
        <label class="text-xs text-slate-400"><input type="checkbox" id="a-balance" class="align-middle" style="width:auto"> also adjust balance</label>
      </div>
      <button class="btn w-full" onclick="addTx()" style="border-radius:10px">Inject Transaction</button>
    </div>

    <!-- inject gift -->
    <div class="panel p-4 mb-4">
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-3">Inject Gift <span class="text-slate-600">(no money value)</span></p>
      <div class="grid grid-cols-2 gap-2 mb-2">
        <input id="g-from" placeholder="From (e.g. Divyanshi)">
        <input id="g-note" placeholder="Gift (e.g. Red Roses 🌹)">
      </div>
      <div class="grid grid-cols-2 gap-2 mb-2">
        <input id="g-img" placeholder="Image path (optional)">
        <input id="g-age" type="number" placeholder="Days ago" class="mono" value="0">
      </div>
      <button class="btn w-full" onclick="addGift()" style="border-radius:10px">Inject Gift</button>
    </div>

    <!-- push notification -->
    <div class="panel p-4 mb-4">
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-3">Push Notification</p>
      <input id="n-title" placeholder="Title" class="mb-2">
      <input id="n-body" placeholder="Body" class="mb-2">
      <label class="text-xs text-slate-400">Icon</label>
      <div class="icon-grid mb-3" id="n-icons"></div>
      <div class="grid grid-cols-2 gap-2">
        <button class="btn" onclick="pushNoti()" style="border-radius:10px">Send</button>
        <button class="btn btn-ghost" onclick="if(confirm('Clear inbox?')){NovaPay.clearNotifications();hydrate();flash('Inbox cleared')}" style="border-radius:10px">Clear Inbox</button>
      </div>
      <div id="noti-list" class="mt-3"></div>
    </div>

    <!-- transactions editor -->
    <div class="panel p-4 mb-4">
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide mb-3">Transactions <span id="tx-count" class="text-slate-600"></span></p>
      <div id="tx-editor"></div>
    </div>

    <!-- danger -->
    <div class="panel p-4">
      <p class="text-[11px] font-bold text-red-400 uppercase tracking-wide mb-2">Danger Zone</p>
      <button class="btn btn-danger w-full" onclick="if(confirm('Reset ALL app data to seed?')){NovaPay.reset();hydrate();}" style="border-radius:10px">Reset app to seed data</button>
    </div>
  </div>

  <script>
    // ---- lock screen ----
    let pin = '';
    function paint() { document.querySelectorAll('#pin-dots .pin-dot').forEach((d,i)=>d.classList.toggle('on', i<pin.length)); }
    document.querySelectorAll('#lock .key').forEach(k => k.onclick = () => {
      const key = k.dataset.k; if (!key) return;
      const err = document.getElementById('pin-err');
      if (key === 'del') { pin = pin.slice(0,-1); paint(); return; }
      if (pin.length >= 4) return;
      pin += key; paint();
      if (pin.length === 4) setTimeout(() => {
        if (NovaPay.checkAdminPin(pin)) { document.getElementById('lock').classList.add('hidden'); document.getElementById('console').classList.remove('hidden'); hydrate(); }
        else { err.textContent = 'Access denied'; pin=''; paint(); if(navigator.vibrate)navigator.vibrate(150); }
      }, 120);
    });

    // ---- console ----
    function toDateInput(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
    function hydrate() {
      const s = NovaPay.state;
      document.getElementById('bal-in').value = (s.balanceCents/100).toFixed(2);
      document.getElementById('name-in').value = s.profile.name || '';
      document.getElementById('handle-in').value = s.profile.handle || '';
      document.getElementById('pfp-preview').src = s.profile.avatar || 'IMG_20251214_013513.jpg';
      renderTxEditor();
      renderNotiList();
      renderContacts();
      buildIconGrid('tx-icons', TX_ICONS, txIcon, ic => txIcon = ic);
      buildIconGrid('n-icons',  N_ICONS,  nIcon,  ic => nIcon  = ic);
    }
    function setBal(){ NovaPay.setBalanceCents(Math.round(parseFloat(document.getElementById('bal-in').value||0)*100)); flash('Balance updated'); }
    function setName(){ NovaPay.setProfile({name: document.getElementById('name-in').value.trim()||'Pranav D.'}); flash('Name saved'); }
    function setHandle(){ NovaPay.setProfile({handle: document.getElementById('handle-in').value.trim()}); flash('Username saved'); }

    // profile picture upload -> base64 data-uri into profile.avatar
    document.getElementById('pfp-file').addEventListener('change', async e => {
      const f = e.target.files[0]; if (!f) return;
      const url = await NovaPay.readFileAsDataURL(f);
      NovaPay.setProfile({ avatar: url });
      document.getElementById('pfp-preview').src = url;
      flash('Profile picture updated');
    });

    // per-contact editor: name, handle, and picture (file upload or path)
    function renderContacts(){
      const el = document.getElementById('contact-editor'); if(!el) return;
      el.innerHTML = NovaPay.contacts().map(c => `
        <div class="row py-3">
          <div class="flex items-center gap-2 mb-2">
            <img src="${NovaPay.avatarFor(c)}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#0b1020" onerror="this.style.opacity=.3">
            <input value="${(c.name||'').replace(/"/g,'&quot;')}" onchange="cUpd('${c.id}','name',this.value)" placeholder="name" style="flex:1">
          </div>
          <div class="flex gap-2 mb-2">
            <input value="${(c.handle||'').replace(/"/g,'&quot;')}" onchange="cUpd('${c.id}','handle',this.value)" placeholder="@handle" class="mono text-xs">
          </div>
          <div class="flex items-center gap-2">
            <input value="${(c.img||'').replace(/"/g,'&quot;')}" onchange="cUpd('${c.id}','img',this.value)" placeholder="image path" class="mono text-xs" style="flex:1">
            <label class="btn btn-ghost text-xs px-3" style="border-radius:8px;cursor:pointer">Upload<input type="file" accept="image/*" style="display:none" onchange="cUpload('${c.id}',this)"></label>
          </div>
        </div>`).join('');
    }
    function cUpd(id,k,v){ NovaPay.setContact(id,{[k]:v}); flash('Saved'); if(k==='img')renderContacts(); }
    async function cUpload(id,input){
      const f=input.files[0]; if(!f) return;
      const url=await NovaPay.readFileAsDataURL(f);
      NovaPay.setContact(id,{img:url}); flash('Contact photo updated'); renderContacts();
    }
    function addTx(){
      const name=document.getElementById('a-name').value||'Manual';
      const note=document.getElementById('a-note').value||'';
      const amt=Math.round(parseFloat(document.getElementById('a-amt').value||0)*100);
      const dstr=document.getElementById('a-date').value;
      const ts=dstr? new Date(dstr+'T12:00:00').getTime() : Date.now();
      const adjust=document.getElementById('a-balance').checked;
      // addTransaction always moves balance; if not adjusting, offset it back
      const before=NovaPay.balanceCents;
      NovaPay.addTransaction({name,note,amountCents:amt,ts,category:amt>=0?'income':'expense',icon:txIcon,color:amt>=0?'green':'slate'});
      if(!adjust) NovaPay.setBalanceCents(before);
      hydrate(); flash('Injected');
    }
    function addGift(){
      const from=document.getElementById('g-from').value.trim();
      const note=document.getElementById('g-note').value.trim();
      if(!from||!note){ flash('From + gift required'); return; }
      const img=document.getElementById('g-img').value.trim();
      const age=parseInt(document.getElementById('g-age').value||'0',10);
      const r=NovaPay.addGift({from,note,img,ageDays:age});
      if(r.ok){ document.getElementById('g-from').value=''; document.getElementById('g-note').value=''; document.getElementById('g-img').value=''; flash('Gift added'); }
      else flash(r.error||'Failed');
    }

    // --- icon pickers (transaction + notification) ---
    const TX_ICONS = ['fa-arrow-down','fa-arrow-up','fa-cart-shopping','fa-mug-hot','fa-car','fa-house','fa-bolt','fa-plane','fa-utensils','fa-basket-shopping','fa-gift','fa-user'];
    const N_ICONS  = ['fa-bell','fa-arrow-down','fa-gift','fa-credit-card','fa-shield-halved','fa-crown','fa-mobile-screen','fa-file-invoice','fa-cake-candles','fa-bolt','fa-wallet','fa-plane'];
    let txIcon = 'fa-arrow-up', nIcon = 'fa-bell';

    function buildIconGrid(elId, icons, current, onPick){
      const el=document.getElementById(elId);
      el.innerHTML=icons.map(ic=>`<div class="icon-opt ${ic===current?'sel':''}" data-ic="${ic}"><i class="fa-solid ${ic}"></i></div>`).join('');
      el.querySelectorAll('.icon-opt').forEach(o=>o.onclick=()=>{
        el.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('sel'));
        o.classList.add('sel'); onPick(o.dataset.ic);
      });
    }

    function pushNoti(){
      const title=document.getElementById('n-title').value.trim();
      const body=document.getElementById('n-body').value.trim();
      if(!title){ flash('Title required'); return; }
      const r=NovaPay.addNotification({title,body,icon:nIcon});
      if(r.ok){ document.getElementById('n-title').value=''; document.getElementById('n-body').value=''; hydrate(); flash('Notification sent'); }
      else flash(r.error||'Failed');
    }

    function renderNotiList(){
      const el=document.getElementById('noti-list'); if(!el) return;
      const ns=NovaPay.notifications();
      el.innerHTML = '<p class="text-[11px] text-slate-500 mb-1 mt-1">Inbox ('+ns.length+', '+NovaPay.unreadCount()+' unread)</p>' +
        ns.slice(0,6).map(n=>`
          <div class="row py-2 flex items-center gap-2">
            <i class="fa-solid ${n.icon||'fa-bell'} text-slate-400 text-xs w-4 text-center"></i>
            <span class="text-xs flex-1 truncate ${n.read?'text-slate-500':'text-slate-200'}">${(n.title||'').replace(/</g,'&lt;')}</span>
            <button class="btn btn-danger text-[10px] px-2 py-1" onclick="delNoti('${n.id}')" style="border-radius:6px"><i class="fa-solid fa-xmark"></i></button>
          </div>`).join('');
    }
    function delNoti(id){ NovaPay.deleteNotification(id); hydrate(); }
    function renderTxEditor(){
      const txs=NovaPay.transactions();
      document.getElementById('tx-count').textContent='('+txs.length+')';
      document.getElementById('tx-editor').innerHTML = txs.map(t=>`
        <div class="row py-3">
          <div class="flex gap-2 mb-2">
            <input value="${(t.name||'').replace(/"/g,'&quot;')}" onchange="upd('${t.id}','name',this.value)" class="text-xs">
            <input type="number" step="0.01" value="${(t.amountCents/100).toFixed(2)}" onchange="updAmt('${t.id}',this.value)" class="mono text-xs" style="max-width:110px">
          </div>
          <div class="flex gap-2 items-center">
            <input type="date" value="${toDateInput(t.ts)}" onchange="updDate('${t.id}',this.value)" class="text-xs">
            <button class="btn btn-danger text-xs px-3" onclick="del('${t.id}')" style="border-radius:8px"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>`).join('');
    }
    function upd(id,k,v){ NovaPay.updateTransaction(id,{[k]:v}); }
    function updAmt(id,v){ NovaPay.updateTransaction(id,{amountCents:Math.round(parseFloat(v||0)*100)}); hydrate(); }
    function updDate(id,v){ NovaPay.updateTransaction(id,{ts:new Date(v+'T12:00:00').getTime()}); renderTxEditor(); }
    function del(id){ NovaPay.deleteTransaction(id); hydrate(); }
    function flash(msg){ const e=document.createElement('div'); e.textContent=msg; e.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1d4ed8;color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:99'; document.body.appendChild(e); setTimeout(()=>e.remove(),1200); }
  </script>
    <script src="haptics.js?v=16" defer></script>
</body>
</html>
